<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>박정연 · 데이터 분석 포트폴리오</title>
  <meta name="description" content="가설을 세우고 데이터로 검증해 실행 가능한 의사결정으로 연결합니다. 실험·통계, 코호트, 머신러닝, 대시보드 프로젝트 포트폴리오." />

  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=25" />
</head>
<body>
  <!-- ===== NAV ===== -->
  <header class="nav" id="nav">
    <div class="wrap nav__inner">
      <a href="#hero" class="nav__brand">박정연<span>.</span></a>
      <nav class="nav__links">
        <a class="nav__cta" href="#projects">프로젝트 보기</a>
      </nav>
    </div>
  </header>

  <main>
    <!-- ===== HERO ===== -->
    <section class="hero" id="hero">
      <div class="wrap">
        <p class="hero__eyebrow">DATA · ANALYTICS · DECISION</p>
        <h1 class="hero__title" id="heroTitle"></h1>
        <p class="hero__intro" id="heroIntro"></p>

        <!-- 핵심역량: 한 줄 칩 -->
        <div class="hero__chips" id="heroChips"></div>

        <ul class="hero__stats" id="heroStats"></ul>
      </div>
    </section>

    <!-- ===== PROJECTS ===== -->
    <section class="section" id="projects">
      <div class="wrap">
        <header class="section__head">
          <span class="section__tag">PROJECTS</span>
          <h2 class="section__title">프로젝트</h2>
          <p class="section__sub">카드를 누르면 <strong>분석 목적 → 데이터 → 분석 과정 → 결과 → 제안 → 회고</strong>까지 담은 상세 페이지로 들어갑니다.</p>
        </header>

        <!-- 조합(프리셋) 안내 배지 -->
        <div class="set-note" id="setNote" style="display:none"></div>

        <!-- 필터 -->
        <div class="filters" id="filters"></div>

        <!-- 전체 그리드 -->
        <div class="grid" id="projectGrid"></div>
      </div>
    </section>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer" id="contact">
    <div class="wrap footer__inner">
      <div>
        <p class="footer__name">박정연</p>
        <p class="footer__line" id="footerTagline"></p>
      </div>
      <ul class="footer__links" id="footerLinks"></ul>
    </div>
    <div class="wrap footer__copy">© <span id="year"></span> 박정연 · Data Analytics Portfolio</div>
  </footer>

  <script src="data.js?v=25"></script>
  <script src="main.js?v=25"></script>
</body>
</html>
